name: Release Binaries

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            compiler: gcc
            output: codemeter-linux-x86_64
          - arch: arm64
            compiler: aarch64-linux-gnu-gcc
            output: codemeter-linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux GCC toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc \
            gcc-aarch64-linux-gnu

      - name: Verify compiler exists
        run: |
          command -v ${{ matrix.compiler }}
          ${{ matrix.compiler }} --version

      - name: Build binary
        run: |
          mkdir -p dist
          CSTD=-std=c23
          if ! ${{ matrix.compiler }} -std=c23 -x c - -fsyntax-only < /dev/null; then
            CSTD=-std=c2x
          fi

          ${{ matrix.compiler }} $CSTD -O2 -Wall -Wextra -pedantic codemeter.c \
            -o dist/${{ matrix.output }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: dist/${{ matrix.output }}

  build-windows:
    name: Build Windows (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            mingw_arch: x86_64
            compiler: x86_64-w64-mingw32-gcc
            output: codemeter-windows-x86_64.exe
          - arch: arm64
            mingw_arch: aarch64
            compiler: aarch64-w64-mingw32-gcc
            output: codemeter-windows-arm64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MinGW-w64 GCC toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            mingw-w64 \
            gcc-mingw-w64-x86-64 \
            gcc-mingw-w64-aarch64

      - name: Verify compiler exists
        run: |
          command -v ${{ matrix.compiler }}
          ${{ matrix.compiler }} --version

      - name: Build binary
        run: |
          mkdir -p dist
          CSTD=-std=c23
          if ! ${{ matrix.compiler }} -std=c23 -x c - -fsyntax-only < /dev/null; then
            CSTD=-std=c2x
          fi

          ${{ matrix.compiler }} $CSTD -O2 -Wall -Wextra -pedantic codemeter.c \
            -o dist/${{ matrix.output }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: dist/${{ matrix.output }}

  publish-release-assets:
    name: Upload Release Assets
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: codemeter-*
          merge-multiple: true
          path: dist

      - name: Publish assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/codemeter-linux-x86_64
            dist/codemeter-linux-arm64
            dist/codemeter-windows-x86_64.exe
            dist/codemeter-windows-arm64.exe
