name: Release Binaries

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux-x86_64:
    name: Build Linux (x86_64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify GCC exists
        run: |
          command -v gcc
          gcc --version

      - name: Build binary
        run: |
          mkdir -p dist
          CSTD=-std=c23
          if ! gcc -std=c23 -x c - -fsyntax-only < /dev/null; then
            CSTD=-std=c2x
          fi

          gcc $CSTD -O2 -Wall -Wextra -pedantic codemeter.c \
            -o dist/codemeter-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: codemeter-linux-x86_64
          path: dist/codemeter-linux-x86_64

  build-linux-arm64:
    name: Build Linux (arm64)
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify GCC exists
        run: |
          command -v gcc
          gcc --version

      - name: Build binary
        run: |
          mkdir -p dist
          CSTD=-std=c23
          if ! gcc -std=c23 -x c - -fsyntax-only < /dev/null; then
            CSTD=-std=c2x
          fi

          gcc $CSTD -O2 -Wall -Wextra -pedantic codemeter.c \
            -o dist/codemeter-linux-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: codemeter-linux-arm64
          path: dist/codemeter-linux-arm64

  build-windows-x86_64:
    name: Build Windows (x86_64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2 with GCC
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: mingw-w64-ucrt-x86_64-gcc

      - name: Build binary
        shell: msys2 {0}
        run: |
          mkdir -p dist
          CSTD=-std=c23
          if ! gcc -std=c23 -x c - -fsyntax-only < /dev/null; then
            CSTD=-std=c2x
          fi

          gcc $CSTD -O2 -Wall -Wextra -pedantic codemeter.c \
            -o dist/codemeter-windows-x86_64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: codemeter-windows-x86_64.exe
          path: dist/codemeter-windows-x86_64.exe

  build-windows-arm64:
    name: Build Windows (arm64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build binary (native arm64)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null

          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) {
            throw "vswhere.exe not found"
          }

          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.ARM64 -property installationPath
          if ([string]::IsNullOrWhiteSpace($vsPath)) {
            throw "Visual Studio ARM64 toolchain not found on runner"
          }

          $vcvars = Join-Path $vsPath "VC\Auxiliary\Build\vcvarsall.bat"
          if (-not (Test-Path $vcvars)) {
            throw "vcvarsall.bat not found"
          }

          $script = @"
@echo off
call "$vcvars" x64_arm64
if errorlevel 1 exit /b 1
cl /nologo /std:clatest /O2 /W4 codemeter.c /Fe:dist\codemeter-windows-arm64.exe
"@

          Set-Content -Path build-arm64.cmd -Value $script -Encoding ascii
          cmd /c build-arm64.cmd
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: codemeter-windows-arm64.exe
          path: dist/codemeter-windows-arm64.exe

  publish-release-assets:
    name: Upload Release Assets
    runs-on: ubuntu-latest
    needs:
      - build-linux-x86_64
      - build-linux-arm64
      - build-windows-x86_64
      - build-windows-arm64

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: codemeter-*
          merge-multiple: true
          path: dist

      - name: Publish assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/codemeter-linux-x86_64
            dist/codemeter-linux-arm64
            dist/codemeter-windows-x86_64.exe
            dist/codemeter-windows-arm64.exe
